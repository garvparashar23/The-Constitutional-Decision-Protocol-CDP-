# Computational Constitutional Rules
# These hard limits are mathematically bound and evaluated by the SMT Solvers

constraints:
  - id: "c1_safety"
    name: "Safety Risk Threshold"
    type: "safety"
    variable: "predicted_risk"
    operator: "<"
    threshold: 0.4
    is_hard: true
    description: "The predicted risk must be strictly less than 0.4"

  - id: "c1_temporal_safety"
    name: "Temporal Safety Escalation Limit"
    type: "safety_temporal"
    variable: "risk_t_plus_dt"
    operator: "<="
    threshold: 0.4
    is_hard: true
    description: "Waiting or delay must not cause risk(t+Δt) to escalate beyond threshold."

  - id: "c2_fairness"
    name: "Demographic Fairness Bound"
    type: "fairness"
    variable: "predicted_fairness"
    operator: ">="
    threshold: 0.75
    is_hard: true
    description: "Fairness = 1 - variance(harm_distribution). Minimax stakeholder disparity must be strictly bounded."

  - id: "c3_utility"
    name: "Utility Maximization Baseline"
    type: "utility"
    variable: "utility"
    operator: ">"
    threshold: 0.0
    is_hard: false
    description: "The decision should yield a positive utility"
